name: Main Branch Build

on:
  push:
    branches:
      - develop

jobs:
  build_and_test:
    if: github.repository_owner == 'OneLiteFeatherNET'
    name: Build and Test
    runs-on: ${{ matrix.os }}
    env:
      ONELITEFEATHER_MAVEN_USERNAME: ${{ secrets.ONELITEFEATHER_MAVEN_USERNAME }}
      ONELITEFEATHER_MAVEN_PASSWORD: ${{ secrets.ONELITEFEATHER_MAVEN_PASSWORD }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build on ${{ matrix.os }}
        run: ./gradlew test
      - name: CycloneDX BOM Generation
        if: always() && matrix.os == 'ubuntu-latest'
        run: ./gradlew cyclonedxBom
      - name: Upload BOM to Dependency-Track
        if: always() && matrix.os == 'ubuntu-latest'
        uses: DependencyTrack/gh-upload-sbom@v3
        with:
          serverhostname: ${{ secrets.DEPENDENCYTRACK_HOSTNAME }}
          apikey: ${{ secrets.DEPENDENCYTRACK_APIKEY }}
          projectname: "Tamias"
          projectversion: 'develop'
          projecttags: 'minestom,java,minigame'
          bomfilename: "build/reports/cyclonedx/bom.xml"
          autocreate: true
          parent: '82dce036-36bd-4450-b36b-18cc71e4e0f4'
